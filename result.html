 let students = JSON.parse(localStorage.getItem('student')) || [];

        // safety check
        if (students.length === 0) {
            document.getElementById('student').innerHTML = "<h2>No data found</h2>";
        } else {
            let lastStudent = students[students.length - 1];

            document.getElementById('student').innerHTML = `
                <div class="student_container">
                    
                    <!-- Student Info -->
                    <div class="student-info">
                        <h2><strong>Name:</strong> ${lastStudent.sname}</h2>
                        <h2><strong>Roll No:</strong> ${lastStudent.srol}</h2>
                        <h2><strong>Enrollment No:</strong> ${lastStudent.senroll}</h2>
                    </div>

                    <!-- Marks Table -->
                    <table class="marks-table">
                        <tr>
                            <th>Subject</th>
                            <th>Marks</th>
                        </tr>
                        <tr>

                        </tr>
                        <tr>

                        </tr>

                        </tr>

                        </tr>
                        <tr>

                        </tr>
                    </table>

                        <h2><strong>Total:</strong> ${lastStudent.total}</h2>
